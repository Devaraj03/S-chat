{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>S Chat</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#111827;
            color:white;
        }

        .chat-card{
            background:#1f2937;
            border:none;
            border-radius:15px;
        }

        .chat-list-item{
            background:#1f2937;
            color:white;
            text-decoration:none;
            border-radius:12px;
            padding:15px;
            display:block;
            margin-bottom:10px;
        }

        .chat-list-item:hover{
            background:#374151;
            color:white;
        }

        .sent{
            background:#2563eb;
            color:white;
            padding:10px 15px;
            border-radius:15px;
            max-width:70%;
            margin-left:auto;
            margin-bottom:10px;
        }

        .received{
            background:#374151;
            color:white;
            padding:10px 15px;
            border-radius:15px;
            max-width:70%;
            margin-bottom:10px;
        }

        .chat-box{
            height:70vh;
            overflow-y:auto;
            padding:20px;
            background:#1f2937;
            border-radius:15px;
        }

    </style>

</head>
<body>

<div class="container py-4">

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
